version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ship_digital_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  spider-api:
    build: .
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # 容器内连接同网络的 mysql 服务
      DB_HOST: mysql
      DB_PORT: 3306
      # 关闭 Consul（云端直接用环境变量）
      USE_CONSUL_CONFIG: "false"
      SERVICE_HOST: ${SERVICE_HOST:-localhost}
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
